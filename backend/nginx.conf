events {}
http {
    server {
        listen 80;
        client_max_body_size 300M; # Ye limit 300MB kar dega

        location / {
            proxy_pass http://127.0.0.1:8000; # Aapka FastAPI port
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
        }
    }
}
